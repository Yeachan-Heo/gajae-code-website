name: Sync Gajae Code version

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout Gajae Code source
        uses: actions/checkout@v4
        with:
          repository: Yeachan-Heo/gajae-code
          ref: dev
          path: source/gajae-code

      - name: Sync product version
        run: python3 scripts/sync-product-version.py source/gajae-code

      - name: Check version drift
        run: python3 scripts/check-version-drift.py source/gajae-code

      - name: Validate static site
        run: python3 scripts/validate-site.py

      - name: Open update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/sync-gajae-code-version
          delete-branch: true
          title: "chore: sync Gajae Code website version"
          commit-message: "chore: sync Gajae Code website version"
          body: |
            Automated website version sync from `Yeachan-Heo/gajae-code` `dev`.

            Validation:
            - `python3 scripts/check-version-drift.py source/gajae-code`
            - `python3 scripts/validate-site.py`
